<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>File Share</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    .box {
      background: #1e1e1e;
      padding: 30px;
      border-radius: 16px;
      width: 400px;
      text-align: center;
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
    }

    input, button {
      width: 100%;
      padding: 12px;
      margin-top: 12px;
      border-radius: 10px;
      border: none;
      box-sizing: border-box;
    }

    button {
      background: #4f46e5;
      color: white;
      cursor: pointer;
      font-size: 16px;
    }

    a {
      color: #7c83ff;
      word-break: break-all;
    }

    #viewer {
      margin-top: 20px;
    }

    img, video {
      max-width: 100%;
      border-radius: 12px;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="box">
    <h2>Обмен файлами</h2>

    <div id="uploadUI">
      <input type="file" id="fileInput" />
      <button onclick="uploadFile()">Создать ссылку</button>
      <div id="result"></div>
    </div>

    <div id="viewer"></div>
  </div>

  <script>
    async function uploadFile() {
      const input = document.getElementById('fileInput');
      const file = input.files[0];

      if (!file) {
        alert('Выбери файл');
        return;
      }

      const reader = new FileReader();

      reader.onload = () => {
        const data = encodeURIComponent(reader.result);
        const name = encodeURIComponent(file.name);

        const link = `${location.origin}${location.pathname}?file=${name}#${data}`;

        document.getElementById('result').innerHTML = `
          <p>Ссылка:</p>
          <a href="${link}" target="_blank">${link}</a>
        `;
      };

      reader.readAsDataURL(file);
    }

    function openFile() {
      const hash = location.hash.slice(1);
      const params = new URLSearchParams(location.search);
      const name = decodeURIComponent(params.get('file') || 'file');

      if (!hash) return;

      document.getElementById('uploadUI').style.display = 'none';

      const data = decodeURIComponent(hash);
      const viewer = document.getElementById('viewer');

      if (data.startsWith('data:image')) {
        viewer.innerHTML = `
          <h3>${name}</h3>
          <img src="${data}">
          <br><br>
          <a href="${data}" download="${name}">
            <button>Скачать</button>
          </a>
        `;
      } else if (data.startsWith('data:video')) {
        viewer.innerHTML = `
          <h3>${name}</h3>
          <video controls src="${data}"></video>
          <br><br>
          <a href="${data}" download="${name}">
            <button>Скачать</button>
          </a>
        `;
      } else {
        viewer.innerHTML = `
          <h3>${name}</h3>
          <a href="${data}" download="${name}">
            <button>Открыть / Скачать файл</button>
          </a>
        `;
      }
    }

    openFile();
  </script>
</body>
</html>
