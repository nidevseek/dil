<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>File Share</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    .box {
      background: #1e1e1e;
      padding: 30px;
      border-radius: 16px;
      width: 420px;
      text-align: center;
    }

    input, button {
      width: 100%;
      padding: 12px;
      margin-top: 12px;
      border-radius: 10px;
      border: none;
      box-sizing: border-box;
    }

    button {
      background: #4f46e5;
      color: white;
      cursor: pointer;
    }

    a { color: #7c83ff; word-break: break-all; }
    img, video, audio { max-width: 100%; margin-top: 10px; border-radius: 12px; }
  </style>
</head>
<body>
  <div class="box">
    <div id="uploadUI">
      <h2>Обмен файлами</h2>
      <input type="file" id="fileInput">
      <button onclick="uploadFile()">Загрузить</button>
      <div id="result"></div>
    </div>

    <div id="viewer"></div>
  </div>

  <script>
    function generateId() {
      return Math.random().toString(36).substring(2, 10);
    }

    function uploadFile() {
      const file = document.getElementById('fileInput').files[0];
      if (!file) return alert('Выбери файл');

      const reader = new FileReader();

      reader.onload = () => {
        const id = generateId();

        localStorage.setItem('file_' + id, JSON.stringify({
          name: file.name,
          type: file.type,
          data: reader.result
        }));

        const link = `${location.origin}${location.pathname}?id=${id}`;

        document.getElementById('result').innerHTML = `
          <p>Ссылка:</p>
          <a href="${link}" target="_blank">${link}</a>
        `;
      };

      reader.readAsDataURL(file);
    }

    function openFile() {
      const id = new URLSearchParams(location.search).get('id');
      if (!id) return;

      const raw = localStorage.getItem('file_' + id);
      if (!raw) {
        document.getElementById('uploadUI').style.display = 'none';
        document.getElementById('viewer').innerHTML = '<h3>Файл не найден</h3><p>Возможно он удалён или открыт на другом устройстве.</p>';
        return;
      }

      document.getElementById('uploadUI').style.display = 'none';

      const file = JSON.parse(raw);
      const viewer = document.getElementById('viewer');

      let preview = `
        <h3>${file.name}</h3>
      `;

      if (file.type.startsWith('image/')) {
        preview += `<img src="${file.data}">`;
      } else if (file.type.startsWith('video/')) {
        preview += `<video controls src="${file.data}"></video>`;
      } else if (file.type.startsWith('audio/')) {
        preview += `<audio controls src="${file.data}"></audio>`;
      }

      preview += `
        <br><br>
        <a href="${file.data}" download="${file.name}">
          <button>Скачать</button>
        </a>
      `;

      viewer.innerHTML = preview;
    }

    openFile();
  </script>
</body>
</html>
